<div id="projects" class="relative z-50 border-t my-12 lg:my-24 border-[#25213b]">

  <img src="assets/section.svg" alt="Hero" class="absolute top-0 -z-10 w-full" />

  <div class="flex justify-center -translate-y-[1px]">
    <div class="w-3/4">
      <div class="h-[1px] bg-gradient-to-r from-transparent via-violet-500 to-transparent w-full"></div>
    </div>
  </div>

  <div class="flex justify-center my-5 lg:py-8">
    <div class="flex items-center">
      <span class="w-24 h-[2px] bg-[#1a1443]"></span>
      <span class="bg-[#1a1443] w-fit text-white p-2 px-5 text-xl rounded-md">
        Projects
      </span>
      <span class="w-24 h-[2px] bg-[#1a1443]"></span>
    </div>
  </div>

  <div
    class="order-1 lg:order-2 from-[#0d1224] to-[#0a0d37] bg-gradient-to-r border border-[#1b2c68a0] rounded-lg relative">

    <div class="flex">
      <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-pink-500 to-violet-600"></div>
      <div class="h-[1px] w-full bg-gradient-to-r from-violet-600 to-transparent"></div>
    </div>

    <div class="overflow-hidden border-t-2 border-indigo-900 px-4 lg:px-8 py-4 lg:py-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-6xl mx-auto">

        <div *ngFor="let project of projects"
          class="rounded-xl shadow-lg overflow-hidden border border-[#1b2c68a0] bg-gradient-to-r from-[#0d1224] to-[#0a0d37] transition-transform hover:scale-[1.02] duration-300">

          <div class="relative overflow-hidden group" (mouseenter)="onMouseEnter(project.id)"
            (mouseleave)="onMouseLeave(project.id, project.images.length)">

            <div class="flex transition-transform duration-[1200ms] ease-[cubic-bezier(0.77,0,0.175,1)]"
              [ngStyle]="{ transform: 'translateX(-' + activeImageIndex[project.id] * 100 + '%)' }"
              style="width: 100%;">

              <div *ngFor="let img of project.images" class="min-w-full">
                <img [src]="img" alt="{{project.name}}" class="w-full object-contain bg-[#0d1224]" />
              </div>
            </div>

            <div
              class="absolute inset-0 flex items-center justify-between px-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <button (click)="prevSlide(project.id)"
                class="bg-black bg-opacity-50 p-2 rounded-full text-white hover:bg-opacity-75">&#10094;</button>
              <button (click)="nextSlide(project.id, project.images.length)"
                class="bg-black bg-opacity-50 p-2 rounded-full text-white hover:bg-opacity-75">&#10095;</button>
            </div>
          </div>


          <div class="p-6 space-y-3">
            <h3 class="text-xl font-semibold text-white">{{ project.name }}</h3>
            <p class="text-sm text-gray-400">{{ project.description }}</p>

            <div class="flex flex-wrap gap-2">
              <span *ngFor="let tool of project.tools"
                class="bg-[#1f2937] text-xs px-3 py-1 rounded-full text-blue-300 border border-blue-700">
                {{ tool }}
              </span>
            </div>

            <div class="text-sm text-gray-300 mt-3">
              <span class="font-semibold">Role:</span> {{ project.role }}
            </div>

            <div class="mt-4 flex gap-3">
              <a *ngIf="project.code" [href]="project.code" target="_blank"
                class="text-sm text-cyan-400 hover:underline">Source Code</a>
              <a *ngIf="project.demo" [href]="project.demo" target="_blank"
                class="text-sm text-cyan-400 hover:underline">Live Demo</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
